# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^(k8s/\.envrc|agent/extensions/notify\.ts)$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: nix-syntax-check
        name: nix syntax check
        entry: bash -eu -c 'for file in "$@"; do nix-instantiate --parse "$file" >/dev/null; done' --
        language: system
        files: \.nix$
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.15.1
    hooks:
      - id: commitizen
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^(bkup/.*\.sh|x/.*\.sh)$
        args: ["--severity=warning"]
  - repo: https://github.com/mrtazz/checkmake.git
    rev: v0.3.0
    hooks:
      - id: checkmake
        files: ^(Makefile|agent/Makefile|k8s/Makefile)$
        args: ["--config=checkmake.ini"]
